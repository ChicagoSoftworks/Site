<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicago</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'JetBrains Mono', monospace;
      color: #c8c8c8;
    }

    .page {
      height: 100vh;
      width: 100vw;
      position: absolute;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition:
        transform 0.7s cubic-bezier(0.65, 0, 0.35, 1),
        opacity   0.7s cubic-bezier(0.65, 0, 0.35, 1),
        filter    0.7s cubic-bezier(0.65, 0, 0.35, 1);
      will-change: transform, opacity, filter;
    }

    #hero {
      transform: translateY(0) scale(1);
      opacity: 1;
      filter: blur(0px);
    }

    #hero.exit {
      transform: translateY(-6vh) scale(0.97);
      opacity: 0;
      filter: blur(12px);
    }

    #info {
      transform: translateY(5vh) scale(0.97);
      opacity: 0;
      filter: blur(12px);
      background: #000;
      pointer-events: none;
    }

    #info.enter {
      transform: translateY(0) scale(1);
      opacity: 1;
      filter: blur(0px);
      pointer-events: all;
    }

    /* ── 3D UI ── */
    .scene { perspective: 900px; }

    .ui-frame {
      border-radius: 4px;
      overflow: hidden;
      transform: rotateX(4deg) rotateY(0deg);
      transition: transform 0.07s ease-out;
      will-change: transform;
      cursor: default;
      user-select: none;
    }

    .ui-frame img {
      display: block;
      width: min(340px, 50vw);
      height: auto;
      pointer-events: none;
    }

    /* ── SCROLL HINT ── */
    .scroll-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(180,180,180,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: fadeHint 2.5s ease-in-out infinite;
    }

    .scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, rgba(180,180,180,0.25), transparent);
    }

    @keyframes fadeHint {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── INFO ── */
    .imgui-sep {
      width: min(420px, 80vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      margin-bottom: 40px;
    }

    .info-title {
      font-size: clamp(52px, 10vw, 110px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      text-transform: uppercase;
      color: #e8e8e8;
      margin-bottom: 10px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.08), 0 -1px 0 rgba(0,0,0,0.8);
    }

    .info-sub {
      font-size: clamp(10px, 1.4vw, 13px);
      font-weight: 300;
      color: rgba(180,180,180,0.4);
      letter-spacing: 0.06em;
      margin-bottom: 48px;
    }

    .github-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 6px 16px;
      border-radius: 2px;
      background: #1f1f1f;
      border-top: 1px solid rgba(255,255,255,0.12);
      border-left: 1px solid rgba(255,255,255,0.08);
      border-right: 1px solid rgba(0,0,0,0.6);
      border-bottom: 1px solid rgba(0,0,0,0.7);
      color: #cccccc;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 1px 3px rgba(0,0,0,0.5);
      transition: background 0.1s, color 0.1s;
    }

    .github-btn:hover { background: #2a2a2a; color: #efefef; }
    .github-btn:active {
      background: #141414;
      border-top-color: rgba(0,0,0,0.5);
      border-bottom-color: rgba(255,255,255,0.06);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
    }

    @media (prefers-reduced-motion: reduce) {
      .ui-frame { transition: none; }
      .page { transition: none; }
      .scroll-hint { animation: none; }
    }
  </style>
</head>
<body>

  <section class="page" id="hero">
    <div class="scene">
      <div class="ui-frame" id="uiFrame">
        <img src="https://github.com/r-tws/ChicagoSite/blob/main/Preview.png?raw=true" alt="ui" draggable="false" />
      </div>
    </div>
    <div class="scroll-hint">scroll</div>
  </section>

  <section class="page" id="info">
    <div class="imgui-sep"></div>
    <h1 class="info-title">Chicago</h1>
    <p class="info-sub">the first fully opensource roblox utility</p>
    <div style="display:flex;gap:10px;align-items:center;">
    <a class="github-btn" href="https://github.com/ChicagoSoftworks/ExternalBase" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.34-3.369-1.34-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
      </svg>
      View on GitHub
    </a>
    <button class="github-btn" id="dlBtn" onclick="downloadLatest()" style="cursor:pointer;border:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span id="dlText">Download</span>
    </button>
    </div>
  </section>

<script>
    // trailing cursor
    (function() {
      let width = window.innerWidth, height = window.innerHeight;
      let cursor = { x: width/2, y: height/2 };
      let particles = [], cursorsInitted = false;
      const totalParticles = 15, rate = 0.4;

      const baseImage = new Image();
      baseImage.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAwAAAATCAYAAACk9eypAAAAAXNSR0IArs4c6QAAACBjSFJNAAB6JgAAgIQAAPoAAACA6AAAdTAAAOpgAAA6mAAAF3CculE8AAAAhGVYSWZNTQAqAAAACAAFARIAAwAAAAEAAQAAARoABQAAAAEAAABKARsABQAAAAEAAABSASgAAwAAAAEAAgAAh2kABAAAAAEAAABaAAAAAAAAAEgAAAABAAAASAAAAAEAA6ABAAMAAAABAAEAAKACAAQAAAABAAAADKADAAQAAAABAAAAEwAAAAAChpcNAAAACXBIWXMAAAsTAAALEwEAmpwYAAABWWlUWHRYTUw6Y29tLmFkb2JlLnhtcAAAAAAAPHg6eG1wbWV0YSB4bWxuczp4PSJhZG9iZTpuczptZXRhLyIgeDp4bXB0az0iWE1QIENvcmUgNS40LjAiPgogICA8cmRmOlJERiB4bWxuczpyZGY9Imh0dHA6Ly93d3cudzMub3JnLzE5OTkvMDIvMjItcmRmLXN5bnRheC1ucyMiPgogICAgICA8cmRmOkRlc2NyaXB0aW9uIHJkZjphYm91dD0iIgogICAgICAgICAgICB4bWxuczp0aWZmPSJodHRwOi8vbnMuYWRvYmUuY29tL3RpZmYvMS4wLyI+CiAgICAgICAgIDx0aWZmOk9yaWVudGF0aW9uPjE8L3RpZmY6T3JpZW50YXRpb24+CiAgICAgIDwvcmRmOkRlc2NyaXB0aW9uPgogICA8L3JkZjpSREY+CjwveDp4bXBtZXRhPgpMwidZAAABqElEQVQoFY3SPUvDQBgH8BREpRHExYiDgmLFl6WC+AYmWeyLg4i7buJX8DMpOujgyxGvUYeCgzhUQUSKKLUS0+ZyptXh8Z5Ti621ekPyJHl+uftfomhaf9Ei5JyxXKfynyEA6EYcLHpwyflT958GAQ7DTABNHd8EbtDbEH2BD5QEQmi2mM8P/Iq+A0SzszEg+3sPjDnDdVEtQKQbMUidHD3xVzf6A9UDEmEm+8h9KTqTVUjT+vB53aHrCbAPiceYq1dQI1Aqv4EhMll0jzv+Y0yiRgCnLRSYyDQHVoqUXe4uKL9l+L7GXC4vkMhE6eW/AOJs9k583ORDUyXMZ8F5SVHVVnllmPNKSFagAJ5DofaqGXw/gHBYg51dIldkmknY3tguv3jOtHR4+MqAzaraJXbEhqHhcQlwGSOi5pytVQHZLN5s0WNe8HPrLYlFsO20RPHkImxsbmHdLJFI76th7Z4SeuF53hTeFLvhRCJRCTKZKxgdnRDbW+iozFJbBMw14/ElwGYc0egMBMFzT21f5Rog33Z7dX02GBm7WV5ZfT5Nn5bE3zuCDe9UxdTpNvK+5AAAAABJRU5ErkJggg==";

      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:9999999';
      document.body.appendChild(canvas);
      canvas.width = width; canvas.height = height;

      window.addEventListener('resize', () => {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
      });

      function Particle(x, y) {
        this.position = { x, y };
        this.move = function(ctx) {
          ctx.drawImage(baseImage, this.position.x, this.position.y);
        };
      }

      document.addEventListener('mousemove', (e) => {
        cursor.x = e.clientX; cursor.y = e.clientY;
        if (!cursorsInitted) {
          cursorsInitted = true;
          for (let i = 0; i < totalParticles; i++) particles.push(new Particle(cursor.x, cursor.y));
        }
      });

      function loop() {
        context.clearRect(0, 0, width, height);
        let x = cursor.x, y = cursor.y;
        particles.forEach((p, i) => {
          const next = particles[i+1] || particles[0];
          p.position.x = x; p.position.y = y;
          p.move(context);
          x += (next.position.x - p.position.x) * rate;
          y += (next.position.y - p.position.y) * rate;
        });
        requestAnimationFrame(loop);
      }
      loop();
    })();

    async function downloadLatest() {
      const btn = document.getElementById('dlBtn');
      const txt = document.getElementById('dlText');
      txt.textContent = 'Fetching...';
      btn.style.opacity = '0.6';
      btn.disabled = true;
      try {
        const res = await fetch('https://api.github.com/repos/ChicagoSoftworks/ExternalBase/releases/latest');
        const data = await res.json();
        const asset = data.assets?.find(a => a.name.toLowerCase().endsWith('.exe'));
        if (asset) {
          const a = document.createElement('a');
          a.href = asset.browser_download_url;
          a.download = asset.name;
          a.click();
          txt.textContent = 'Download';
        } else {
          txt.textContent = 'Not found';
          setTimeout(() => { txt.textContent = 'Download'; }, 2000);
        }
      } catch {
        txt.textContent = 'Error';
        setTimeout(() => { txt.textContent = 'Download'; }, 2000);
      }
      btn.style.opacity = '1';
      btn.disabled = false;
    }

    // shoutout claude bro
    const hero  = document.getElementById('hero');
    const info  = document.getElementById('info');
    const frame = document.getElementById('uiFrame');

    let currentPage = 0;
    let locked = false;

    function goTo(page) {
      if (locked || page === currentPage) return;
      locked = true;
      currentPage = page;

      if (page === 1) {
        hero.classList.add('exit');
        info.classList.add('enter');
      } else {
        hero.classList.remove('exit');
        info.classList.remove('enter');
      }

      setTimeout(() => { locked = false; }, 750);
    }

    window.addEventListener('wheel', (e) => {
      if (e.deltaY > 0) goTo(1); else goTo(0);
    }, { passive: true });

    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
    window.addEventListener('touchend', (e) => {
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(dy) > 40) goTo(dy > 0 ? 1 : 0);
    }, { passive: true });

    document.addEventListener('mousemove', (e) => {
      if (currentPage !== 0) return;
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      frame.style.transform = `rotateX(${-dy * 10}deg) rotateY(${dx * 13}deg)`;
    });

    document.addEventListener('mouseleave', () => {
      frame.style.transition = 'transform 0.5s ease-out';
      frame.style.transform  = 'rotateX(4deg) rotateY(0deg)';
      setTimeout(() => { frame.style.transition = 'transform 0.07s ease-out'; }, 510);
    });
  </script>
</body>
</html>
